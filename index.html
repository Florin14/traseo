<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Traseo - Transport public Cluj-Napoca in timp real" />
    <meta name="theme-color" content="#0A0E1A" />
    <meta property="og:title" content="Traseo - Cluj Transit Tracker" />
    <meta property="og:description" content="Tracking transport public Cluj-Napoca in timp real" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>Traseo</title>
    <style>
      /* Inline critical loading screen - shown before React hydrates */
      body { margin: 0; background: #0A0E1A; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0A0E1A;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash .logo-box {
        width: 56px; height: 56px;
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #0EA5E9, #06B6D4, #06D6A0);
        border-radius: 14px;
        margin-bottom: 20px;
      }
      #splash .logo-box span {
        font-family: 'Inter', sans-serif; font-weight: 900;
        font-size: 28px; color: white;
      }
      #splash .brand {
        font-family: 'Inter', sans-serif; font-weight: 700;
        font-size: 20px; color: #F0F0F5;
        letter-spacing: -0.02em; margin-bottom: 24px;
      }
      #splash .loader-track {
        width: 120px; height: 3px;
        background: rgba(255,255,255,0.06);
        border-radius: 3px; overflow: hidden;
      }
      #splash .loader-bar {
        width: 40%; height: 100%;
        background: linear-gradient(90deg, #0EA5E9, #06D6A0);
        border-radius: 3px;
        animation: load-slide 1s ease-in-out infinite;
      }
      @keyframes load-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-box"><span>T</span></div>
      <div class="brand">Traseo</div>
      <div class="loader-track"><div class="loader-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
